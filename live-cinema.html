<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Cinema · Andrea & Giulia · 5 luglio 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="images/Logo-QR-code.png">
  <link rel="stylesheet" href="live-cinema-styles.css">
</head>
<body class="cinema-body" data-mode="petali">

  <!-- Container principale — il pattern attivo monta qui i suoi elementi -->
  <main id="cinemaStage" class="cinema-stage"></main>

  <!-- Layer petali (sfondo decorativo, attivo per Pattern A) -->
  <div id="petalsLayer" class="petals-layer" aria-hidden="true"></div>

  <!-- Mode indicator (debug, nascosto in produzione via CSS) -->
  <div id="modeIndicator" class="mode-indicator">petali</div>

  <!-- Firebase SDK 9.23.0 compat (stesso del sito) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

  <script src="config.local.js" onerror="this.remove()"></script>
  <script src="firebase-config.js"></script>

  <!-- Engine principale (gestisce pool + variazioni + mode dispatcher) -->
  <script src="live-cinema-engine.js"></script>
</body>
</html>
